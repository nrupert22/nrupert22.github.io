<script>

const text = `
INITIALIZING SYSTEM...
LOADING NETWORK MODULES...
CHECKING SECURITY PROTOCOLS...
ESTABLISHING TERMINAL SESSION...

ACCESS GRANTED

WELCOME NATHAN RUPERT
`;

let i = 0;
const speed = 35;

function typeWriter() {
    if (i < text.length) {
        document.getElementById("bootText").textContent += text.charAt(i);
        i++;
        setTimeout(typeWriter, speed);
    } 
    else {

        setTimeout(() => {

            const boot = document.getElementById("boot");

            boot.style.transition = "opacity 1s";
            boot.style.opacity = "0";

            setTimeout(() => {
                boot.style.display = "none";
            }, 1000);

        }, 1500);
    }
}

window.onload = typeWriter;

</script>
